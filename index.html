<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NY Cricket Live - JioPlayer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; object-fit: contain; }
    
    /* YouTube Style Red UI */
    .youtube-theme .shaka-played-range { background: #FF0000 !important; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: #FF0000; }
    
    /* Overlay UI */
    #playOverlay { position: absolute; inset: 0; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); cursor: pointer; transition: 0.5s; }
    #playOverlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
    .ring { width: 50px; height: 50px; border: 4px solid #333; border-top-color: #f00; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #playBtn { display: none; background: #f00; border-radius: 50%; padding: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
    #playBtn svg { width: 40px; height: 40px; fill: #fff; }
    #channelTitle { position: absolute; left: 15px; top: 15px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; z-index: 10; }
  </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
  <div id="channelTitle">Star Sports 1 Hindi HD</div>
  <video playsinline id="video"></video>
  
  <div id="playOverlay" onclick="startPlayback()">
    <div class="ring" id="loadRing"></div>
    <div id="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div style="color:#fff; margin-top:15px;" id="statusLabel">Fetching Authorization...</div>
  </div>
</div>

<script>
  // Configuration
  const STREAM_URL = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd";
  const COOKIE_API = "https://allrounder-live2.pages.dev/api/star-1-hindi.json";
  const DRM_KEYS = { "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4" };

  let player, video, cleanToken = "";

  async function initPlayer() {
    video = document.getElementById('video');
    shaka.polyfill.installAll();
    
    player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

    // 1. DRM Config
    player.configure({ drm: { clearKeys: DRM_KEYS } });

    // 2. Fetch Cookie Data
    try {
      const resp = await fetch(COOKIE_API);
      const data = await resp.json();
      
      // Cookie se '__hdnea__=' part hatana taaki URL saaf rahe
      const rawCookie = data.cookie;
      cleanToken = rawCookie.includes('__hdnea__=') ? rawCookie.split('__hdnea__=')[1] : rawCookie;

      document.getElementById('statusLabel').innerText = "Ready to Play";
      document.getElementById('loadRing').style.display = 'none';
      document.getElementById('playBtn').style.display = 'flex';
    } catch (e) {
      document.getElementById('statusLabel').innerText = "Auth Error (Check CORS)";
    }

    // 3. Network Filter - Yahaan Cookie URL mein add hoti hai
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      // Headers spoofing
      request.headers['Referer'] = 'https://www.jiotv.com/';
      request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux; Android 13) ExoPlayerLib/2.11.6';
      
      if (cleanToken) {
        // Har request (manifest/segment) ke peeche token lagana
        const separator = request.uris[0].includes('?') ? '&' : '?';
        if (!request.uris[0].includes('__hdnea__=')) {
          request.uris[0] += separator + "__hdnea__=" + cleanToken;
        }
      }
    });

    try {
      await player.load(STREAM_URL);
    } catch (e) {
      console.error("Load Error:", e.code);
    }
  }

  async function startPlayback() {
    try {
      video.muted = false;
      await video.play();
      document.getElementById('playOverlay').classList.add('fade-out');
    } catch (e) {
      // Autoplay with mute if interaction blocked
      video.muted = true;
      video.play();
      document.getElementById('playOverlay').classList.add('fade-out');
    }
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
