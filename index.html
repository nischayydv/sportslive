 500; display: flex; align-items: center; }    .youtube-theme .shaka-overflow-menu span + span { color: #FFF; font-weight: 400 !important; font-size: 12px !important; padding-right: 8px; padding-left: 0 !important; }    .youtube-theme .shaka-overflow-menu span + span:after { content: "navigate_next"; font-family: 'Material Icons Sharp'; font-size: 20px; }    .youtube-theme .shaka-overflow-menu .shaka-pip-button span + span { padding-right: 15px !important; }    .youtube-theme .shaka-overflow-menu .shaka-pip-button span + span:after { content: ""; }    .youtube-theme .shaka-back-to-overflow-button { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.2); font-size: 12px; color: #eee; height: 40px; }    .youtube-theme .shaka-back-to-overflow-button .material-icons-round { font-size: 15px; padding-right: 10px; }    .youtube-theme .shaka-back-to-overflow-button span { margin-left: 3px !important; }    .youtube-theme .shaka-overflow-menu button:hover, .youtube-theme .shaka-settings-menu button:hover { background-color: rgba(255,255,255,.1); cursor: pointer; }    .youtube-theme .shaka-overflow-menu button:focus, .youtube-theme .shaka-settings-menu button:focus { background-color: rgba(255,255,255,.1); border: none; outline: none; }    .youtube-theme .shaka-overflow-menu button, .youtube-theme .shaka-settings-menu button { color: #EEE; }    .youtube-theme .shaka-captions-off { color: #BFBFBF; }    .youtube-theme .shaka-overflow-menu-button { font-size: 18px; margin-right: 5px; }    .youtube-theme .shaka-fullscreen-button:hover { font-size: 25px; transition: font-size 0.1s cubic-bezier(0,0,.2,1); }    .youtube-theme .shaka-seek-bar { background: rgba(255,255,255,.2) !important; }    .youtube-theme .shaka-buffered-range { background: rgba(255,255,255,.4) !important; }    .youtube-theme .shaka-played-range { background: rgb(255,0,0) !important; }    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; visibility: hidden !important; opacity: 0 !important; }    #playOverlay { position: absolute; inset: 0; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; cursor: pointer; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%); }    #playOverlay.fade-out { animation: fadeOut 0.4s ease forwards; pointer-events: none; }    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }    .ring { width: 54px; height: 54px; border: 4px solid rgba(255,255,255,0.15); border-top-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite; }    @keyframes spin { to { transform: rotate(360deg); } }    #playBtn { display: none; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,0,0,0.92); align-items: center; justify-content: center; box-shadow: 0 0 0 0 rgba(255,0,0,0.45); animation: pulse 2.2s infinite; transition: transform 0.15s ease; }    #playBtn svg { width: 34px; height: 34px; margin-left: 6px; fill: #fff; }    #playBtn:hover { transform: scale(1.1); }    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.45); } 70% { box-shadow: 0 0 0 22px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }    .overlay-label { color: rgba(255,255,255,0.85); font-size: 14px; letter-spacing: 0.05em; text-shadow: 0 1px 6px rgba(0,0,0,0.9); }    #channelTitle { position: absolute; left: 10px; top: 10px; color: #fff; font-size: 14px; z-index: 1500; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; pointer-events: none; }    #watermarkLogo { position: absolute; left: 10px; top: 62%; width: 60px; height: auto; opacity: 0.35; z-index: 1500; pointer-events: none; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); transition: opacity 0.3s ease; }    .shaka-video-container:hover #watermarkLogo { opacity: 0.5; }    #errorBox { display: none; position: absolute; inset: 0; z-index: 5000; background: #000; flex-direction: column; align-items: center; justify-content: center; color: #ff6666; font-size: 15px; text-align: center; padding: 24px; gap: 16px; }    #retryBtn { padding: 10px 28px; background: #e00; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }    #retryBtn:hover { background: #c00; }  </style></head><body>
<div class="shaka-video-container youtube-theme" data-shaka-player>  <video playsinline preload="auto"    poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY">  </video>  <div id="playOverlay">    <div class="ring" id="loadRing"></div>    <div id="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>    <div class="overlay-label" id="overlayLabel">Loading stream…</div>  </div>  <div id="channelTitle">Star Sports 1 Hindi HD</div>  <img id="watermarkLogo" src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="">  <div id="errorBox">    <span id="errorMsg">⚠ Stream error</span>    <button id="retryBtn" onclick="retryLoad()">↺ Retry</button>  </div></div>
<script>
  const streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd";
  const COOKIE_API = "https://allrounder-live2.pages.dev/api/star-1-hindi.json";
  const DRM_KEYS = { "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4" };

  const video        = document.querySelector('video');
  const container    = document.querySelector('.shaka-video-container');
  const playOverlay  = document.getElementById('playOverlay');
  const loadRing     = document.getElementById('loadRing');
  const playBtn      = document.getElementById('playBtn');
  const overlayLabel = document.getElementById('overlayLabel');
  const errorBox     = document.getElementById('errorBox');
  const errorMsg     = document.getElementById('errorMsg');

  let streamReady = false, shakaPlayer = null, retryCount  = 0, finalToken = "";
  const MAX_RETRIES = 3, dismissOverlay = () => playOverlay.classList.add('fade-out'), markReady = () => { loadRing.style.display = 'none'; playBtn.style.display = 'flex'; overlayLabel.textContent = 'Tap to Play'; };
  const showError = msg => { errorMsg.textContent = '⚠ ' + msg; errorBox.style.display = 'flex'; playOverlay.style.display = 'none'; };

  const doPlay = async () => { if (!streamReady) return; try { video.muted = false; await video.play(); dismissOverlay(); } catch { video.muted = true; await video.play(); dismissOverlay(); } };
  playOverlay.addEventListener('click', doPlay);

  function retryLoad() { location.reload(); }

  document.addEventListener('DOMContentLoaded', async () => {
    shaka.polyfill.installAll();
    const player = new shaka.Player(video); shakaPlayer = player;
    new shaka.ui.Overlay(player, container, video);

    try {
      const resp = await fetch(COOKIE_API); const data = await resp.json();
      finalToken = data.cookie.split('__hdnea__=')[1] || data.cookie;
    } catch (e) { console.error("Auth failed"); }

    player.configure({ drm: { clearKeys: DRM_KEYS } });
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['Referer'] = 'https://www.jiotv.com/';
      request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux; Android 13) ExoPlayerLib/2.11.6';
      if (finalToken) {
        const sep = request.uris[0].includes('?') ? '&' : '?';
        if (!request.uris[0].includes('__hdnea__=')) request.uris[0] += sep + "__hdnea__=" + finalToken;
      }
    });

    try {
      await player.load(streamUrl); streamReady = true; markReady();
    } catch (e) { showError('Load Error'); }
  });
</script></body></html>
